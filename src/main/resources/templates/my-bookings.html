<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>My Bookings | BookMyTicket</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
}

body {
	background: var(--bg-main);
	color: var(--text-main);
	font-family: sans-serif;
	padding: 30px;
}

h2 {
	color: var(--text-main);
	font-weight: 800;
}

.card {
	background: var(--bg-card);
	border: 1px solid var(--border);
	border-radius: 14px;
	padding: 20px;
	margin-bottom: 16px;
}

.card h5 {
	color: var(--text-main);
	font-weight: 800;
	margin-bottom: 10px;
}

.card p {
	color: var(--text-main);
	margin-bottom: 6px;
	font-size: 0.95rem;
}

.card p .label {
	color: var(--text-muted);
	font-weight: 600;
}

.no-bookings {
	color: var(--text-muted);
}

.btn-secondary {
	background: #1f2937;
	border: 1.5px solid #334155;
	color: var(--text-main);
	font-weight: 700;
}

.btn-secondary:hover {
	background: #334155;
	color: white;
}
</style>
</head>
<body>
<div class="container">
  <h2 class="mb-4">My Bookings</h2>

  <div th:if="${tickets.isEmpty()}">
    <p class="no-bookings">No bookings yet.</p>
  </div>

  <div class="card" th:each="ticket : ${tickets}">
    <h5 th:text="${ticket.movieName}"></h5>
    <p th:text="${ticket.theaterName} + ' - ' + ${ticket.screenName}"></p>
    <p><span class="label">Date:</span> <span th:text="${ticket.showDate}"></span>
       &nbsp;|&nbsp;
       <span class="label">Time:</span> <span th:text="${ticket.showTiming}"></span></p>
    <p><span class="label">Seats:</span> <span th:text="${#strings.arrayJoin(ticket.seatNumber, ', ')}"></span></p>
    <p><span class="label">Price:</span> ₹<span th:text="${ticket.ticketPrice}"></span></p>
    <img th:if="${ticket.qrUrl}" th:src="${ticket.qrUrl}" width="120">
  </div>

  <a href="/" class="btn btn-secondary mt-3">Back</a>
</div>
</body>
</html>
